# Install and configure doom emacs
# Install fonts after installation: M-x all-the-icons-install-fonts
- name: Install doom required packages, emacs, ripgrep, and fd
  package:
    name:
      #      - emacs, use emacs-wayland for wayland support and native compilation
      - emacs-wayland
      - ripgrep
      - cmake   # for compiling moduels like vterm
      - fd      # or fd-find in ubuntu based distros like pop-os
    state: present
  become: yes

- name: Install doom module packages
  package:
    name:
      - aspell-en # for spelling
      - nodejs  # for lsp servers
      - npm     # node.js package manager
      - graphviz  # for orgroam graph and plantuml
    # - languagetool # for grammar check
    # - words   # for /usr/share/dict/words for cape-dict
    state: present
  become: yes

- name: Install python-dev packages
  community.general.pipx:
    executable: pipx
    name: "{{ item }}"
    state: present
  loop:
    - black
    - isort
    - pytest
    - pyright
    - ruff
  register: output

- name : Clone doom-emacs repo
  vars:
    doom_repo: 'https://github.com/doomemacs/doomemacs'
    emacs_conf: "{{ ansible_env.HOME }}/.config/emacs"
  git:
    repo: "{{ doom_repo }}"
    dest: "{{ emacs_conf }}"
    depth: 1

- name: Link doom config
  ansible.builtin.file:
    src: '{{ ansible_env.HOME }}/dotfiles/doom/.doom.d'
    dest: '{{ ansible_env.HOME }}/.doom.d'
    state: link

- name: Configure doom-emacs
  vars:
    emacs_conf: "{{ ansible_env.HOME }}/.config/emacs"
    doom_bin: "{{ emacs_conf }}/bin/doom"
  shell: |
    {{ doom_bin }} install
    {{ doom_bin }} sync
    {{ doom_bin }} doctor
  changed_when: false
  register: output

- debug:
    var: output.stdout_lines
# post installation
# install required fonts and icons by running `nerd-icons-install-fonts`
